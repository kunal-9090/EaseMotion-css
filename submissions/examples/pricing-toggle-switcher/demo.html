<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Toggle Switcher Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="pricing-page" aria-labelledby="pricing-title">
    <section class="pricing-card">
      <p class="eyebrow">Pricing control</p>
      <h1 id="pricing-title">Pricing Toggle Switcher</h1>
      <div class="billing-toggle" role="group" aria-label="Billing cycle">
        <button class="active">Monthly</button>
        <button>Yearly</button>
      </div>
      <article class="price-panel"><span>Pro</span><strong>$24</strong><small>per seat</small></article>
    </section>
  </main>
</body>
</html>
