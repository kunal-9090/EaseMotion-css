<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lumen deploy readiness panel demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage" aria-label="lumen deploy readiness panel demo">
    <article class="motion-panel">
      <div class="pulse-track" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <section class="copy">
        <p class="label">Ready</p>
        <h1>lumen deploy readiness panel</h1>
        <p>Checks passed for release with a measured animation pattern that supports fast scanning.</p>
      </section>
      <aside class="metric" aria-label="Ready metric">
        <span>4/4</span>
        <strong>Ready</strong>
      </aside>
    </article>
  </main>
</body>
</html>
