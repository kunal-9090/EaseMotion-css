<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Timeline Stack Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="timeline-page" aria-labelledby="timeline-title">
    <section class="timeline-card">
      <p class="eyebrow">Notification flow</p>
      <h1 id="timeline-title">Notification Timeline Stack</h1>
      <div class="notification-stack" aria-label="Notification timeline">
        <article><span></span><strong>Build completed</strong><p>Production bundle finished successfully.</p></article>
        <article><span></span><strong>Review assigned</strong><p>A maintainer was added to the queue.</p></article>
        <article><span></span><strong>Deploy pending</strong><p>Final checks are waiting to complete.</p></article>
      </div>
    </section>
  </main>
</body>
</html>
